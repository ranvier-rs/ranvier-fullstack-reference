services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ranvier
      POSTGRES_PASSWORD: ranvierpass
      POSTGRES_DB: ranvier_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ranvier -d ranvier_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgres://ranvier:ranvierpass@db:5432/ranvier_db
      RUST_LOG: info
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  proxy:
    build:
      context: ../..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
