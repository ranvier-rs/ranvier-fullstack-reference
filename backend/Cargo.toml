[package]
name = "ranvier-fullstack-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
# Ranvier Ecosystem (local path deps for 0.10.0 parity)
ranvier-core    = { path = "../../ranvier/core" }
ranvier-runtime = { path = "../../ranvier/runtime" }
ranvier-http    = { path = "../../ranvier/http" }
ranvier-macros  = { path = "../../ranvier/macros" }
ranvier-db      = { path = "../../ranvier/extensions/db" }

# Database - match feature flags exactly with ranvier-db to avoid multiple runtime conflict
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres"] }

# Async & Utilities
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
async-trait = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
